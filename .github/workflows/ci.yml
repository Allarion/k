name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: |
          while IFS= read -r file; do
            bash -n "$file"
          done < <(find bin lib tests -type f \( -name '*.sh' -o -path 'bin/k' \) | sort)

      - name: CLI smoke tests
        run: bash tests/test_cli.sh

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax
        run: python -m compileall k_mcp

      - name: Python tests
        run: python -m unittest discover -s k_mcp/tests -t .
